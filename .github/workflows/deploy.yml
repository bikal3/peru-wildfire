name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
    paths: ['peru-fire-dashboard/**']
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: peru-fire-dashboard/package-lock.json
      - run: npm ci
        working-directory: peru-fire-dashboard
      - run: npm run build
        working-directory: peru-fire-dashboard
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: peru-fire-dashboard/out
